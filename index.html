<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ語 翻訳・発音解析</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .box { 
            max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: auto; 
            overflow: hidden; 
        }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; }
        
        /* 入力エリア（クリアボタン配置用） */
        .input-wrapper { position: relative; width: 100%; margin-bottom: 5px; }
        textarea { 
            width: 100%; height: 100px; padding: 12px; padding-right: 35px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-size: 18px; resize: vertical;
            display: block;
        }
        /* 入力全消去ボタン */
        .clear-btn {
            position: absolute; right: 10px; top: 10px; background: #ccc; color: white;
            border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.7; transition: opacity 0.2s;
        }
        .clear-btn:hover { opacity: 1; }

        .input-controls { 
            display: flex; justify-content: space-between; align-items: center; 
            gap: 10px; margin-top: 5px; margin-bottom: 10px;
        }
        
        /* スピード調整スイッチ（カメさんモード） */
        .speed-control { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #666; }
        .speed-control input { cursor: pointer; }

        .speak-btn { background: none; border: none; cursor: pointer; font-size: 24px; color: #3498db; padding: 0; transition: opacity 0.2s; }
        .speak-btn:hover { opacity: 0.7; }
        
        /* クリップボードコピーボタン */
        .copy-btn {
            background: #f1f2f6; border: 1px solid #ced6e0; border-radius: 4px;
            padding: 3px 8px; font-size: 11px; cursor: pointer; color: #57606f;
            margin-left: 10px; transition: all 0.2s;
        }
        .copy-btn:hover { background: #dfe4ea; }

        #main-btn { 
            width: 100%; padding: 15px; background: #00b894; color: white; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-size: 16px; font-weight: bold;
        }
        #main-btn:disabled { background: #ccc; }
        
        .res-box { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; display: none; }
        
        .full-card { 
            background: #e8f4f8; padding: 15px; border-radius: 10px; 
            margin-bottom: 20px; border-left: 5px solid #3498db; 
        }
        .full-text { font-size: 22px; font-weight: bold; color: #2c3e50; word-break: break-all; }
        .detail-line { 
            margin-top: 10px; font-size: 15px; color: #444; 
            border-top: 1px solid #d4e6f1; padding-top: 8px; 
            line-height: 1.6; word-break: break-all;
        }
        .ipa-text { font-family: 'Courier New', monospace; color: #e67e22; font-weight: bold; }
        
        .word-card { 
            background: #f8f9fa; padding: 15px; border-radius: 8px; 
            margin-bottom: 10px; border-left: 4px solid #00b894; 
        }
        .thai-word { font-size: 24px; font-weight: bold; color: #00b894; word-break: break-all; }

        /* 声調カンペ（アコーディオン） */
        .legend-card {
            margin-top: 20px; background: #fdfefe; border: 1px solid #e1e8ed;
            border-radius: 8px; padding: 10px; font-size: 12px; color: #555;
        }
        .legend-title { font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .legend-content { display: none; margin-top: 8px; border-top: 1px solid #f1f2f6; padding-top: 8px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="box">
        <h2>タイ語 翻訳・発音解析</h2>
        <div class="input-wrapper">
            <textarea id="input" placeholder="タイ語または日本語を入力..."></textarea>
            <button class="clear-btn" onclick="clearInput()" title="入力を全消去">×</button>
        </div>
        <div class="input-controls">
            <!-- カメさんスピード調整 -->
            <div class="speed-control">
                <label><input type="checkbox" id="slow-mode"> 🐢ゆっくり再生</label>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <span style="font-size: 12px; color: #888;">入力を聞く:</span>
                <button class="speak-btn" onclick="speakInput()">🔊</button>
            </div>
        </div>
        
        <button id="main-btn" onclick="run()">解析・翻訳する</button>

        <div id="result" class="res-box">
            <div class="full-card">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; gap: 10px;">
                    <span id="full-trans" class="full-text"></span>
                    <div style="display: flex; align-items: center; flex-shrink: 0;">
                        <!-- コピーボタン -->
                        <button class="copy-btn" onclick="copyResult()">📋コピー</button>
                        <button id="speak-output-btn" class="speak-btn" style="margin-left: 8px;">🔊</button>
                    </div>
                </div>
                <div class="detail-line"><strong>IPA:</strong> <span id="full-ipa" class="ipa-text"></span></div>
                <div class="detail-line"><strong>読み:</strong> <span id="full-katakana"></span></div>
            </div>
            <div id="word-list"></div>
        </div>

        <!-- 声調記号のカンペ -->
        <div class="legend-card">
            <div class="legend-title" onclick="toggleLegend()">
                <span>💡 カタカナ声調記号の読み方（凡例）</span>
                <span id="legend-arrow">▼</span>
            </div>
            <div id="legend-content" class="legend-content">
                <strong>→ 平声（へいせい）：</strong>普通の高さでまっすぐ伸ばす<br>
                <strong>↓ 低声（ていせい）：</strong>最初から低く平らに発音する<br>
                <strong>↘ 下声（かせい）：</strong>高いところから一気に引き下ろす<br>
                <strong>↑ 高声（こうせい）：</strong>最初からずっと高い位置を保つ<br>
                <strong>↗ 上声（じょうせい）：</strong>低いところから一気に引き上げる<br>
                <strong>〜 長音（ちょうおん）：</strong>母音をのばして発音する
            </div>
        </div>
    </div>

    <script>
        // 入力全消去
        function clearInput() {
            document.getElementById('input').value = '';
            document.getElementById('input').focus();
        }

        // コピー機能（iframe対応の安全なクラシック方式）
        function copyResult() {
            const textToCopy = document.getElementById('full-trans').innerText;
            if (!textToCopy) return;

            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            try {
                document.execCommand('copy');
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '✅完了!';
                setTimeout(() => copyBtn.innerText = originalText, 1500);
            } catch (err) {
                console.error('コピー失敗:', err);
            }
            document.body.removeChild(tempTextArea);
        }

        // 凡例トグル
        function toggleLegend() {
            const content = document.getElementById('legend-content');
            const arrow = document.getElementById('legend-arrow');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.innerText = '▼';
            } else {
                content.style.display = 'block';
                arrow.innerText = '▲';
            }
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            const uttr = new SpeechSynthesisUtterance(text);
            const isThai = /[\u0E00-\u0E7F]/.test(text);
            uttr.lang = isThai ? 'th-TH' : 'ja-JP';

            const voices = window.speechSynthesis.getVoices();
            let voice = voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && v.name.includes('Google')) ||
                        voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && (v.name.includes('Siri') || v.name.includes('Premium') || v.name.includes('Kanya'))) ||
                        voices.find(v => v.lang.includes(isThai ? 'th' : 'ja'));
            
            if (voice) uttr.voice = voice;

            // ✅ カメさん（ゆっくり再生）スイッチがONなら速度を0.6にする
            const slowMode = document.getElementById('slow-mode').checked;
            uttr.rate = slowMode ? 0.6 : 0.9;

            window.speechSynthesis.speak(uttr);
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function speakInput() {
            speak(document.getElementById('input').value.trim());
        }

        async function run() {
            const btn = document.getElementById('main-btn');
            const inputVal = document.getElementById('input').value.trim();
            if(!inputVal) return;

            btn.disabled = true; btn.textContent = "解析中...";
            document.getElementById('result').style.display = 'none';

            try {
                const res = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: inputVal })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('full-trans').innerText = data.full_translation;
                document.getElementById('full-ipa').innerText = data.full_ipa;
                document.getElementById('full-katakana').innerText = data.full_katakana;
                
                document.getElementById('speak-output-btn').onclick = () => speak(data.full_translation);

                const list = document.getElementById('word-list');
                
                list.innerHTML = data.words.map(w => {
                    const cleanThai = (w.thai || '').replace(/['"`\n\r\\]/g, '').trim();
                    return `
                        <div class="word-card">
                            <div style="display:flex; justify-content:space-between; align-items:center; gap: 10px;">
                                <span class="thai-word">${cleanThai}</span>
                                <button class="speak-btn" style="flex-shrink:0;" onclick="speak('${cleanThai}')">🔊</button>
                            </div>
                            <div style="color:#666; font-size:14px; margin-top:5px;">
                                読み: ${w.reading || ''} | <span class="ipa-text">${w.ipa || ''}</span>
                            </div>
                            <div style="margin-top:8px;">${w.meaning || ''}</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('result').style.display = 'block';
            } catch (e) { alert("エラー: " + e.message); }
            finally { btn.disabled = false; btn.textContent = "解析・翻訳する"; }
        }
    </script>
</body>
</html>
