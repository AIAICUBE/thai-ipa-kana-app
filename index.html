<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ語 翻訳・発音解析</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .box { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: auto; }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; }
        textarea { display: block; width: 100%; min-height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; margin-bottom: 10px; resize: vertical; }
        .btn-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 10px; }
        .speak-btn { background: none; border: none; cursor: pointer; font-size: 24px; color: #3498db; }
        #main-btn { width: 100%; padding: 15px; background: #00b894; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .res-box { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; display: none; }
        .full-card { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        .full-text { font-size: 22px; font-weight: bold; color: #2c3e50; word-break: break-all; }
        .detail-line { margin-top: 10px; font-size: 15px; color: #444; border-top: 1px solid #d4e6f1; padding-top: 8px; line-height: 1.6; word-break: break-all; }
        .ipa-text { font-family: 'Courier New', monospace; color: #e67e22; font-weight: bold; }
        .word-card { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00b894; }
        .thai-word { font-size: 24px; font-weight: bold; color: #00b894; word-break: break-all; }
    </style>
</head>
<body>
    <div class="box">
        <h2>タイ語 翻訳・発音解析</h2>
        <textarea id="input" placeholder="タイ語または日本語を入力..."></textarea>
        <div class="btn-row">
            <span>入力の発音:</span>
            <button class="speak-btn" onclick="speakInput()">🔊</button>
        </div>
        <button id="main-btn" onclick="run()">解析・翻訳する</button>
        <div id="result" class="res-box">
            <div class="full-card">
                <div style="display:flex; justify-content:space-between; align-items: flex-start;">
                    <span id="full-trans" class="full-text"></span>
                    <button id="speak-output-btn" class="speak-btn">🔊</button>
                </div>
                <div class="detail-line"><strong>IPA:</strong> <span id="full-ipa" class="ipa-text"></span></div>
                <div class="detail-line"><strong>読み:</strong> <span id="full-katakana"></span></div>
            </div>
            <div id="word-list"></div>
        </div>
    </div>
    <script>
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            const isThai = /[\u0E00-\u0E7F]/.test(text);
            uttr.lang = isThai ? 'th-TH' : 'ja-JP';
            const voices = window.speechSynthesis.getVoices();
            let voice = voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && v.name.includes('Google')) ||
                        voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && (v.name.includes('Siri') || v.name.includes('Premium'))) ||
                        voices.find(v => v.lang.includes(isThai ? 'th' : 'ja'));
            if (voice) uttr.voice = voice;
            uttr.rate = 0.9;
            window.speechSynthesis.speak(uttr);
        }
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        function speakInput() {
            const text = document.getElementById('input').value.trim();
            if(text) speak(text);
        }
        async function run() {
            const btn = document.getElementById('main-btn');
            const text = document.getElementById('input').value.trim();
            if(!text) return;
            btn.disabled = true; btn.textContent = "解析中...";
            try {
                const res = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                document.getElementById('full-trans').innerText = data.full_translation;
                document.getElementById('full-ipa').innerText = data.full_ipa;
                document.getElementById('full-katakana').innerText = data.full_katakana;
                document.getElementById('speak-output-btn').onclick = () => speak(data.full_translation);
                const list = document.getElementById('word-list');
                list.innerHTML = data.words.map(w => `
                    <div class="word-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="thai-word">${w.thai}</span>
                            <button class="speak-btn" onclick="speak('${w.thai}')">🔊</button>
                        </div>
                        <div style="color:#666; font-size:14px;">\${w.reading} | \${w.ipa}</div>
                        <div style="margin-top:5px;">\${w.meaning}</div>
                    </div>
                `).join('');
                document.getElementById('result').style.display = 'block';
            } catch (e) { alert("エラー: " + e.message); }
            finally { btn.disabled = false; btn.textContent = "解析・翻訳する"; }
        }
    </script>
</body>
</html>
