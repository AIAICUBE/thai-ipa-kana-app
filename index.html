<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タイ語⇄日本語 翻訳・タイ語発音解析</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .box { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; margin-bottom: 15px; }
        #main-btn { width: 100%; padding: 15px; background: #00b894; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #main-btn:disabled { background: #cbd5e1; }
        .res-box { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; display: none; }
        .full-card { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        .ipa-text { color: #e67e22; font-weight: bold; font-family: monospace; }
        .word-card { background: #f8f9fa; padding: 14px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00b894; }
    </style>
</head>
<body>
    <div class="box">
        <h2>タイ語⇄日本語 翻訳・タイ語発音解析</h2>
        <textarea id="input" placeholder="タイ語または日本語を入力..."></textarea>
        <button id="main-btn" onclick="run()">解析・翻訳する</button>

        <div id="result" class="res-box">
            <div class="full-card">
                <div id="full-trans" style="font-size:22px; font-weight:bold;"></div>
                <div style="margin-top:10px;">IPA: <span id="full-ipa" class="ipa-text"></span></div>
                <div style="margin-top:5px;">読み: <span id="full-katakana"></span></div>
            </div>
            <div id="word-list"></div>
        </div>
    </div>

    <script>
        async function run() {
            const btn = document.getElementById('main-btn');
            const inputVal = document.getElementById('input').value.trim();
            if(!inputVal) return;
            
            btn.disabled = true; btn.textContent = "解析中...";
            try {
                const res = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'translate', text: inputVal })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('full-trans').innerText = data.full_translation;
                document.getElementById('full-ipa').innerText = data.full_ipa;
                document.getElementById('full-katakana').innerText = data.full_katakana;
                document.getElementById('word-list').innerHTML = data.words.map(w => `
                    <div class="word-card">
                        <b style="color:#00b894; font-size:18px;">${w.thai}</b><br>
                        読み: ${w.reading} | IPA: <span class="ipa-text">${w.ipa}</span><br>
                        意味: ${w.meaning}
                    </div>
                `).join('');
                document.getElementById('result').style.display = 'block';
            } catch (e) { alert("エラー: " + e.message); }
            finally { btn.disabled = false; btn.textContent = "解析・翻訳する"; }
        }
    </script>
</body>
</html>
