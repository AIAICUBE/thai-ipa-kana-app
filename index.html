<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日泰・泰日 翻訳＆発音記号変換ツール</title>
    <style>
        /* 見た目のCSS（先ほどと同じ） */
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5em; text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #e8f4f8; border-left: 5px solid #3498db; border-radius: 4px; display: none; }
        .result-item { margin-bottom: 10px; }
        .result-label { font-size: 0.85em; color: #7f8c8d; margin-bottom: 2px; }
        .result-value { font-size: 1.2em; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>日泰・泰日 翻訳＆発音変換</h1>
    <div class="radio-group">
        <label><input type="radio" name="direction" value="th2jp" checked> タイ語 → 日本語</label>
        <label><input type="radio" name="direction" value="jp2th"> 日本語 → タイ語</label>
    </div>
    <div class="form-group">
        <textarea id="inputText" placeholder="ここに入力..."></textarea>
    </div>
    <button id="translateBtn" onclick="translateText()">変換する</button>

    <div id="resultBox" class="result-box">
        <div class="result-item">
            <div class="result-label" id="targetLangLabel">翻訳結果</div>
            <div class="result-value" id="outTargetLang">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">IPA (国際音声記号)</div>
            <div class="result-value" id="outIpa">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">カタカナ発音</div>
            <div class="result-value" id="outKata">-</div>
        </div>
    </div>
</div>

<script>
async function translateText() {
        const text = document.getElementById("inputText").value.trim();
        const direction = document.querySelector('input[name="direction"]:checked').value;
        const btn = document.getElementById("translateBtn");
        const resultBox = document.getElementById("resultBox");

        if (!text) return alert("テキストを入力してください。");

        btn.disabled = true;
        btn.textContent = "変換中...";
        resultBox.style.display = "none";

        try {
            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, direction: direction })
            });

            // JSONではなく、Vercelからの返答を一旦そのままの「文字」として受け取る
            const responseText = await response.text(); 

            let data;
            try {
                data = JSON.parse(responseText); // ここでJSONに変換
            } catch (parseError) {
                // Vercelがクラッシュしてエラー画面（HTML）を返してきている場合
                alert("Vercelのエラー（通信エラーの正体）:\n" + responseText.substring(0, 300));
                return;
            }

            if (data.error) {
                alert("バックエンドからのエラー報告:\n" + data.error);
            } else {
                document.getElementById("targetLangLabel").textContent = direction === "th2jp" ? "日本語の意味" : "タイ語";
                document.getElementById("outTargetLang").textContent = data.translation;
                document.getElementById("outIpa").textContent = data.ipa;
                document.getElementById("outKata").textContent = data.katakana;
                resultBox.style.display = "block";
            }
        } catch (error) {
            alert("完全なネットワーク切断などのエラー:\n" + error.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "変換する";
        }
    }
</script>

</body>
</html>
