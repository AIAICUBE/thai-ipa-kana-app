<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ語⇄日本語 翻訳・タイ語発音解析</title>
    <style>
        :root {
            --primary: #00b894;
            --secondary: #3498db;
            --accent: #e67e22;
            --danger: #e74c3c;
            --bg-base: #f5f7fb;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            padding: 20px; 
            background: var(--bg-base); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .box { 
            width: 100%;
            max-width: 500px; 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.06); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ヘッダーエリア */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 12px;
        }
        h2 { font-size: 1.25rem; margin: 0; font-weight: 800; color: var(--text-main); }

        /* 入力エリア */
        .input-area { width: 100%; position: relative; }
        textarea { 
            width: 100%; height: 110px; padding: 14px; padding-right: 35px; 
            border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; 
            font-size: 17px; resize: vertical; display: block;
            outline: none; transition: border-color 0.2s;
            line-height: 1.5;
        }
        textarea:focus { border-color: var(--secondary); }
        
        /* 入力クリア（全消去）ボタン */
        .clear-btn {
            position: absolute; right: 10px; top: 10px; background: #cbd5e1; color: white;
            border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.8; transition: opacity 0.2s; z-index: 10;
        }
        .clear-btn:hover { opacity: 1; }

        /* 文字数カウンター */
        .counter-area {
            display: flex;
            justify-content: flex-end;
            font-size: 11px;
            color: var(--text-sub);
            margin-top: -10px;
        }
        .counter-warn { color: var(--danger); font-weight: bold; }

        .input-controls { 
            display: flex; justify-content: space-between; align-items: center; 
            gap: 10px; margin-bottom: 5px;
        }
        
        /* カメさんスピード選択 */
        .speed-control { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-sub); }
        .speed-control label { cursor: pointer; display: flex; align-items: center; gap: 3px; user-select: none; }
        .speed-control input { cursor: pointer; }

        .speak-btn { background: none; border: none; cursor: pointer; font-size: 24px; color: var(--secondary); padding: 0; transition: opacity 0.2s; }
        .speak-btn:hover { opacity: 0.7; }
        
        /* アニメーション */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .recording-active { color: var(--danger) !important; animation: pulse 1.2s infinite; }
        .playing-active { color: #2ecc71 !important; animation: pulse 1s infinite; }

        /* ボタン・バッジ類 */
        .copy-btn, .fav-btn {
            background: #f1f2f6; border: 1px solid #ced6e0; border-radius: 6px;
            padding: 4px 10px; font-size: 11px; cursor: pointer; color: #57606f;
            transition: all 0.2s; display: flex; align-items: center; gap: 4px;
            font-weight: 600;
        }
        .copy-btn:hover, .fav-btn:hover { background: #dfe4ea; }
        .fav-btn { color: var(--accent); border-color: #f39c12; }

        #main-btn { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; cursor: pointer; 
            font-size: 16px; font-weight: bold; transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.15);
        }
        #main-btn:hover:not(:disabled) { background: #00a383; }
        #main-btn:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }
        
        /* 結果表示カード */
        .res-box { margin-top: 15px; border-top: 2px solid #edf2f7; padding-top: 15px; display: none; }
        .full-card { 
            background: #e8f4f8; padding: 18px; border-radius: 12px; 
            margin-bottom: 15px; border-left: 5px solid var(--secondary); 
        }
        .full-text { font-size: 22px; font-weight: bold; color: var(--text-main); word-break: break-all; }
        .detail-line { 
            margin-top: 10px; font-size: 14px; color: #475569; 
            border-top: 1px solid #d4e6f1; padding-top: 8px; 
            line-height: 1.6; word-break: break-all;
        }
        .ipa-text { font-family: 'Courier New', monospace; color: var(--accent); font-weight: bold; }
        
        /* 単語カード */
        .word-card { 
            background: #f8f9fa; padding: 14px 16px; border-radius: 10px; 
            margin-bottom: 10px; border-left: 4px solid var(--primary); 
            border: 1px solid #f1f5f9; border-left: 4px solid var(--primary);
        }
        .thai-word { font-size: 24px; font-weight: bold; color: var(--primary); word-break: break-all; }

        /* 凡例 */
        .legend-card {
            background: #fdfefe; border: 1px solid #e1e8ed;
            border-radius: 10px; padding: 12px; font-size: 12px; color: #555;
        }
        .legend-title { font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .legend-content { display: none; margin-top: 8px; border-top: 1px solid #f1f2f6; padding-top: 8px; line-height: 1.6; }

        /* マイ単語帳 */
        .notebook-card {
            background: #fffdf0; border: 1px solid #f1e7bc;
            border-radius: 10px; padding: 15px; font-size: 13px;
        }
        .notebook-title { font-weight: bold; color: #b78a00; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .notebook-list { max-height: 220px; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .notebook-item {
            padding: 10px 8px; border-bottom: 1px solid #f9f5d7; display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .notebook-item:last-child { border-bottom: none; }
        .notebook-del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 0 4px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <h2>タイ語⇄日本語 翻訳・タイ語発音解析</h2>
        </div>

        <div class="input-area">
            <textarea id="input" placeholder="タイ語または日本語を入力..." oninput="updateCharCount()"></textarea>
            <button class="clear-btn" onclick="clearInput()" title="入力を全消去">×</button>
        </div>
        
        <div class="counter-area">
            <span id="char-count">0</span> / 500文字
        </div>

        <div class="input-controls">
            <div class="speed-control">
                <label><input type="checkbox" id="slow-mode"> 🐢ゆっくり再生</label>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: #888;">音声入力:</span>
                    <button id="mic-btn" class="speak-btn" onclick="toggleSpeechRecognition()" title="声で文字入力">🎤</button>
                </div>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: #888;">入力を聞く:</span>
                    <button id="input-speak-btn" class="speak-btn" onclick="speakInput()">🔊</button>
                </div>
            </div>
        </div>
        
        <button id="main-btn" onclick="run()">解析・翻訳する</button>

        <div id="result" class="res-box">
            <div class="full-card">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; gap: 10px;">
                    <span id="full-trans" class="full-text"></span>
                    <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
                        <button class="fav-btn" onclick="saveToNotebook()">⭐ 保存</button>
                        <button class="copy-btn" onclick="copyResult()">📋コピー</button>
                        <button id="speak-output-btn" class="speak-btn">🔊</button>
                    </div>
                </div>
                <div class="detail-line"><strong>IPA:</strong> <span id="full-ipa" class="ipa-text"></span></div>
                <div class="detail-line"><strong>読み:</strong> <span id="full-katakana"></span></div>
            </div>
            <div id="word-list"></div>
        </div>

        <div class="legend-card">
            <div class="legend-title" onclick="toggleLegend()">
                <span>💡 カタカナ声調記号の読み方（凡例）</span>
                <span id="legend-arrow">▼</span>
            </div>
            <div id="legend-content" class="legend-content">
                <strong>→ 平声（へいせい）：</strong>普通の高さでまっすぐ伸ばす<br>
                <strong>↓ 低声（ていせい）：</strong>最初から低く平らに発音する<br>
                <strong>↘ 下声（かせい）：</strong>高いところから一気に引き下ろす<br>
                <strong>↑ 高声（こうせい）：</strong>最初からずっと高い位置を保つ<br>
                <strong>↗ 上声（じょうせい）：</strong>低いところから一気に引き上げる<br>
                <strong>〜 長音（ちょうおん）：</strong>母音をのばして発音する
            </div>
        </div>

        <div class="notebook-card">
            <div class="notebook-title">
                <span>⭐ マイ単語帳（ローカル保存）</span>
                <span id="notebook-count" style="font-size: 11px; font-weight: normal; color: #8a6d00;">0件</span>
            </div>
            <ul id="notebook-list" class="notebook-list">
            </ul>
        </div>
    </div>

    <script>
        // リアルタイム文字数カウンター
        function updateCharCount() {
            const inputArea = document.getElementById('input');
            const countSpan = document.getElementById('char-count');
            const len = inputArea.value.length;
            
            countSpan.innerText = len;
            if (len > 500) {
                countSpan.classList.add('counter-warn');
            } else {
                countSpan.classList.remove('counter-warn');
            }
        }

        function clearInput() {
            document.getElementById('input').value = '';
            updateCharCount(); 
            document.getElementById('input').focus();
        }

        function copyResult() {
            const textToCopy = document.getElementById('full-trans').innerText;
            if (!textToCopy) return;

            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            try {
                document.execCommand('copy');
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '✅完了!';
                setTimeout(() => copyBtn.innerText = originalText, 1500);
            } catch (err) {
                console.error('コピー失敗:', err);
            }
            document.body.removeChild(tempTextArea);
        }

        function toggleLegend() {
            const content = document.getElementById('legend-content');
            const arrow = document.getElementById('legend-arrow');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.innerText = '▼';
            } else {
                content.style.display = 'block';
                arrow.innerText = '▲';
            }
        }

        // ⭐ マイ単語帳
        let currentResultData = null; 

        function loadNotebook() {
            const listEl = document.getElementById('notebook-list');
            const countEl = document.getElementById('notebook-count');
            let data = [];
            
            try {
                data = JSON.parse(localStorage.getItem('thai_notebook') || '[]');
                if (!Array.isArray(data)) {
                    data = [];
                }
            } catch (e) {
                console.error("ローカルストレージの読込エラー:", e);
                data = [];
            }
            
            countEl.innerText = data.length + "件";
            if (data.length === 0) {
                listEl.innerHTML = `<li style="color:#aaa; font-size:12px; text-align:center; padding:10px;">保存された単語はありません。</li>`;
                return;
            }

            listEl.innerHTML = data.map((item, index) => {
                if (!item) return '';
                const trans = item.trans || '';
                const katakana = item.katakana || '';
                const ipa = item.ipa || '';
                const origin = item.origin || '';
                
                const safeTrans = trans.replace(/['"`\n\r]/g, ' ').replace(/\\/g, '').trim();
                const btnId = `book-play-btn-${index}`;

                return `
                    <li class="notebook-item">
                        <div style="flex-grow: 1; min-width: 0;">
                            <div style="font-weight: bold; color: #2c3e50; word-break: break-all;">${trans}</div>
                            <div style="font-size: 11px; color: #666; margin-top:2px;">
                                ${katakana} | <span class="ipa-text" style="font-size:11px;">${ipa}</span>
                            </div>
                            <div style="font-size: 11px; color: #888; background:#fff; padding:2px 6px; border-radius:4px; margin-top:2px; display:inline-block;">原文: ${origin}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
                            <button id="${btnId}" class="speak-btn" style="font-size:18px;" onclick="speak('${safeTrans}', '${btnId}')">🔊</button>
                            <button class="notebook-del-btn" onclick="deleteFromNotebook(${index})">❌</button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function saveToNotebook() {
            if (!currentResultData) return;
            let data = [];
            
            try {
                data = JSON.parse(localStorage.getItem('thai_notebook') || '[]');
                if (!Array.isArray(data)) data = [];
            } catch (e) {
                data = [];
            }
            
            const isDuplicate = data.some(item => item && item.trans === currentResultData.trans);
            if (isDuplicate) {
                alert("この結果はすでに単語帳に保存されています。");
                return;
            }

            data.unshift(currentResultData); 
            localStorage.setItem('thai_notebook', JSON.stringify(data));
            
            const favBtn = document.querySelector('.fav-btn');
            if (favBtn) favBtn.innerText = "✅保存済";
            loadNotebook();
        }

        function deleteFromNotebook(index) {
            let data = [];
            try {
                data = JSON.parse(localStorage.getItem('thai_notebook') || '[]');
                if (!Array.isArray(data)) data = [];
            } catch (e) {
                data = [];
            }
            
            data.splice(index, 1);
            localStorage.setItem('thai_notebook', JSON.stringify(data));
            loadNotebook();
            
            const favBtn = document.querySelector('.fav-btn');
            if (favBtn && favBtn.innerText === "✅保存済") favBtn.innerText = "⭐ 保存";
        }

        window.addEventListener('DOMContentLoaded', loadNotebook);

        // 音声認識（Speech Recognition）の制御
        let recognition = null;
        let isListening = false;

        function toggleSpeechRecognition() {
            const micBtn = document.getElementById('mic-btn');
            const inputArea = document.getElementById('input');

            if (isListening) {
                if (recognition) recognition.stop();
                return;
            }

            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            if (!SpeechRecognition) {
                alert("お使いのブラウザ・環境は音声入力をサポートしていません。Chromeや最新のモバイルブラウザでお試しください。");
                return;
            }

            recognition = new SpeechRecognition();
            
            const currentText = inputArea.value.trim();
            const isThaiInput = /[\u0E00-\u0E7F]/.test(currentText);
            recognition.lang = isThaiInput ? 'th-TH' : 'ja-JP';
            
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('recording-active');
                inputArea.placeholder = "音声を聞き取り中（お話しください）...";
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('recording-active');
                inputArea.placeholder = "タイ語または日本語を入力...";
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                inputArea.value = speechResult;
                updateCharCount(); 
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラー:", event.error);
                isListening = false;
                micBtn.classList.remove('recording-active');
                inputArea.placeholder = "タイ語または日本語を入力...";
            };

            recognition.start();
        }

        // ==========================================
        // 🎙️ Gemini 2.5 Live TTS (PCM16 -> WAV変換再生)
        // ==========================================
        let currentAudio = null;

        function pcmToWav(pcmBase64, sampleRate) {
            const buffer = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0)).buffer;
            const wav = new ArrayBuffer(44 + buffer.byteLength);
            const view = new DataView(wav);
            
            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + buffer.byteLength, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); 
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, buffer.byteLength, true);
            
            const pcmView = new Uint8Array(buffer);
            const wavView = new Uint8Array(wav);
            wavView.set(pcmView, 44);
            
            return new Blob([wav], { type: 'audio/wav' });
        }

        async function fetchGeminiTts(text) {
            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'tts', text: text })
            });

            if (!response.ok) throw new Error("TTS APIエラー");

            const data = await response.json();
            if (data.error) throw new Error(data.detail ? `${data.error}: ${data.detail}` : data.error);

            const pcmBase64 = data.audio_data;
            const mimeType = data.mime_type || "audio/L16;rate=24000";

            if(!pcmBase64) throw new Error("音声データが空です");

            let sampleRate = 24000;
            const rateMatch = mimeType.match(/rate=(\d+)/);
            if (rateMatch) {
                sampleRate = parseInt(rateMatch[1], 10);
            }

            return pcmToWav(pcmBase64, sampleRate);
        }

        async function speak(text, btnElementId) {
            const btn = document.getElementById(btnElementId);
            if (btn) btn.classList.add('playing-active');

            const slowMode = document.getElementById('slow-mode').checked;
            const playSpeed = slowMode ? 0.65 : 0.95;

            try {
                // 1. Gemini公式 Live Natural Voice (TTS) の取得と高音質再生
                const audioBlob = await fetchGeminiTts(text);
                const audioUrl = URL.createObjectURL(audioBlob);

                if (currentAudio) currentAudio.pause();
                currentAudio = new Audio(audioUrl);
                currentAudio.playbackRate = playSpeed;
                
                currentAudio.onended = () => {
                    if (btn) btn.classList.remove('playing-active');
                    URL.revokeObjectURL(audioUrl);
                };
                currentAudio.onerror = () => {
                    if (btn) btn.classList.remove('playing-active');
                    URL.revokeObjectURL(audioUrl);
                };
                currentAudio.play();

            } catch (err) {
                console.warn("Live TTSが使えません。ブラウザフォールバック音声で読み上げます:", err);
                
                // 2. フォールバック：ブラウザ内蔵SpeechSynthesis
                if (!window.speechSynthesis) {
                    if (btn) btn.classList.remove('playing-active');
                    return;
                }
                window.speechSynthesis.cancel();
                
                const uttr = new SpeechSynthesisUtterance(text);
                const isThai = /[\u0E00-\u0E7F]/.test(text);
                uttr.lang = isThai ? 'th-TH' : 'ja-JP';

                const voices = window.speechSynthesis.getVoices();
                let voice = voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && v.name.includes('Google')) ||
                            voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && (v.name.includes('Siri') || v.name.includes('Premium') || v.name.includes('Kanya'))) ||
                            voices.find(v => v.lang.includes(isThai ? 'th' : 'ja'));
                
                if (voice) uttr.voice = voice;
                uttr.rate = playSpeed;
                
                uttr.onend = () => { if (btn) btn.classList.remove('playing-active'); };
                uttr.onerror = () => { if (btn) btn.classList.remove('playing-active'); };
                
                window.speechSynthesis.speak(uttr);
            }
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function speakInput() {
            const inputVal = document.getElementById('input').value.trim();
            if (inputVal) speak(inputVal, 'input-speak-btn');
        }

        // ==========================================
        // 🧠 Gemini 2.5 Proによる超高精度翻訳＆言語解析
        // ==========================================
        async function fetchGeminiTranslation(text) {
            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            if (!response.ok) throw new Error("翻訳APIエラー");

            const data = await response.json();
            if (data.error) throw new Error(data.detail ? `${data.error}: ${data.detail}` : data.error);

            return data;
        }

        async function run() {
            const btn = document.getElementById('main-btn');
            const inputVal = document.getElementById('input').value.trim();
            if(!inputVal) return;

            btn.disabled = true; btn.textContent = "解析中...";
            document.getElementById('result').style.display = 'none';
            const favBtn = document.querySelector('.fav-btn');
            if (favBtn) favBtn.innerText = "⭐ 保存"; 

            try {
                const data = await fetchGeminiTranslation(inputVal);

                document.getElementById('full-trans').innerText = data.full_translation;
                document.getElementById('full-ipa').innerText = data.full_ipa;
                document.getElementById('full-katakana').innerText = data.full_katakana;
                
                currentResultData = {
                    origin: inputVal,
                    trans: data.full_translation,
                    ipa: data.full_ipa,
                    katakana: data.full_katakana
                };

                document.getElementById('speak-output-btn').onclick = () => speak(data.full_translation, 'speak-output-btn');

                const list = document.getElementById('word-list');
                
                list.innerHTML = data.words.map((w, index) => {
                    const cleanThai = (w.thai || '').replace(/['"`\n\r\\]/g, '').trim();
                    const cardBtnId = `word-play-btn-${index}`;
                    return `
                        <div class="word-card">
                            <div style="display:flex; justify-content:space-between; align-items:center; gap: 10px;">
                                <span class="thai-word">${cleanThai}</span>
                                <button id="${cardBtnId}" class="speak-btn" style="flex-shrink:0;" onclick="speak('${cleanThai}', '${cardBtnId}')">🔊</button>
                            </div>
                            <div style="color:#666; font-size:14px; margin-top:5px;">
                                読み: ${w.reading || ''} | <span class="ipa-text">${w.ipa || ''}</span>
                            </div>
                            <div style="margin-top:8px;">${w.meaning || ''}</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('result').style.display = 'block';
            } catch (e) { 
                alert("エラー: " + e.message); 
            } finally { 
                btn.disabled = false; btn.textContent = "解析・翻訳する"; 
            }
        }
    </script>
</body>
</html>
