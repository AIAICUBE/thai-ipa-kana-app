<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ語解析ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .box { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #00b894; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; }
        .res-box { margin-top: 25px; display: none; border-top: 2px solid #eee; padding-top: 20px; }
        .word-card { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #00b894; }
        .thai-text { font-size: 20px; color: #2d3436; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>タイ語 ⇄ 日本語 翻訳解析</h2>
        <textarea id="input" placeholder="タイ語を入力してください..."></textarea>
        <button id="btn" onclick="run()">解析する</button>

        <div id="result" class="res-box">
            <h3 id="main-trans"></h3>
            <div id="word-list"></div>
        </div>
    </div>

    <script>
        async function run() {
            const btn = document.getElementById('btn');
            const text = document.getElementById('input').value.trim();
            if(!text) return;

            btn.disabled = true; btn.textContent = "解析中...";
            document.getElementById('result').style.display = 'none';

            try {
                const res = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('main-trans').innerText = "全体訳: " + data.translation;
                const list = document.getElementById('word-list');
                list.innerHTML = "";
                
                data.words.forEach(w => {
                    list.innerHTML += `<div class="word-card">
                        <div class="thai-text">${w.thai}</div>
                        <div>読み: ${w.reading} | IPA: ${w.ipa}</div>
                        <div>意味: ${w.meaning}</div>
                    </div>`;
                });
                document.getElementById('result').style.display = 'block';
            } catch (e) { alert("エラー: " + e.message); }
            finally { btn.disabled = false; btn.textContent = "解析する"; }
        }
    </script>
</body>
</html>
