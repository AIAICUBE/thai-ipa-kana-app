<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ語⇄日本語 翻訳・タイ語発音解析</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .box { 
            max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: auto; 
            overflow: hidden; 
        }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; }
        
        /* 入力エリア */
        .input-area { width: 100%; margin-bottom: 5px; position: relative; }
        textarea { 
            width: 100%; height: 100px; padding: 12px; padding-right: 35px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-size: 18px; resize: vertical;
            display: block;
        }
        
        /* 入力クリア（全消去）ボタン */
        .clear-btn {
            position: absolute; right: 10px; top: 10px; background: #ccc; color: white;
            border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.7; transition: opacity 0.2s; z-index: 10;
        }
        .clear-btn:hover { opacity: 1; }

        /* 文字数カウンターのスタイル */
        .counter-area {
            display: flex;
            justify-content: flex-end;
            font-size: 11px;
            color: #888;
            margin-top: 2px;
            margin-bottom: 5px;
        }
        .counter-warn { color: #e74c3c; font-weight: bold; }

        .input-controls { 
            display: flex; justify-content: space-between; align-items: center; 
            gap: 10px; margin-top: 5px; margin-bottom: 10px;
        }
        
        /* カメさんスピード選択用 */
        .speed-control { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #666; }
        .speed-control label { cursor: pointer; display: flex; align-items: center; gap: 3px; }
        .speed-control input { cursor: pointer; }

        .speak-btn { background: none; border: none; cursor: pointer; font-size: 24px; color: #3498db; padding: 0; transition: opacity 0.2s; }
        .speak-btn:hover { opacity: 0.7; }
        
        /* 音声認識作動中のマイクアイコンアニメーション */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .recording-active { color: #e74c3c !important; animation: pulse 1.2s infinite; }

        /* クリップボードコピーボタン・星マークボタン */
        .copy-btn, .fav-btn {
            background: #f1f2f6; border: 1px solid #ced6e0; border-radius: 4px;
            padding: 3px 8px; font-size: 11px; cursor: pointer; color: #57606f;
            transition: all 0.2s; display: flex; align-items: center; gap: 3px;
        }
        .copy-btn:hover, .fav-btn:hover { background: #dfe4ea; }
        .fav-btn { color: #e67e22; border-color: #f39c12; }

        #main-btn { 
            width: 100%; padding: 15px; background: #00b894; color: white; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-size: 16px; font-weight: bold;
        }
        #main-btn:disabled { background: #ccc; }
        
        .res-box { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; display: none; }
        .full-card { 
            background: #e8f4f8; padding: 15px; border-radius: 10px; 
            margin-bottom: 20px; border-left: 5px solid #3498db; 
        }
        .full-text { font-size: 22px; font-weight: bold; color: #2c3e50; word-break: break-all; }
        .detail-line { 
            margin-top: 10px; font-size: 15px; color: #444; 
            border-top: 1px solid #d4e6f1; padding-top: 8px; 
            line-height: 1.6; word-break: break-all;
        }
        .ipa-text { font-family: 'Courier New', monospace; color: #e67e22; font-weight: bold; }
        
        .word-card { 
            background: #f8f9fa; padding: 15px; border-radius: 8px; 
            margin-bottom: 10px; border-left: 4px solid #00b894; 
        }
        .thai-word { font-size: 24px; font-weight: bold; color: #00b894; word-break: break-all; }

        /* 声調記号の凡例アコーディオン */
        .legend-card {
            margin-top: 20px; background: #fdfefe; border: 1px solid #e1e8ed;
            border-radius: 8px; padding: 10px; font-size: 12px; color: #555;
        }
        .legend-title { font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .legend-content { display: none; margin-top: 8px; border-top: 1px solid #f1f2f6; padding-top: 8px; line-height: 1.5; }

        /* マイ単語帳セクションのスタイル */
        .notebook-card {
            margin-top: 15px; background: #fffdf0; border: 1px solid #f1e7bc;
            border-radius: 8px; padding: 12px; font-size: 13px;
        }
        .notebook-title { font-weight: bold; color: #b78a00; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .notebook-list { max-height: 200px; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .notebook-item {
            padding: 8px; border-bottom: 1px solid #f9f5d7; display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .notebook-item:last-child { border-bottom: none; }
        .notebook-del-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 14px; padding: 0 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>タイ語⇄日本語 翻訳・タイ語発音解析</h2>
        <div class="input-area">
            <textarea id="input" placeholder="タイ語または日本語を入力..." oninput="updateCharCount()"></textarea>
            <button class="clear-btn" onclick="clearInput()" title="入力を全消去">×</button>
        </div>
        
        <div class="counter-area">
            <span id="char-count">0</span> / 500文字
        </div>

        <div class="input-controls">
            <div class="speed-control">
                <label><input type="checkbox" id="slow-mode"> 🐢ゆっくり再生</label>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: #888;">音声入力:</span>
                    <button id="mic-btn" class="speak-btn" onclick="toggleSpeechRecognition()" title="声で文字入力">🎤</button>
                </div>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: #888;">入力を聞く:</span>
                    <button class="speak-btn" onclick="speakInput()">🔊</button>
                </div>
            </div>
        </div>
        
        <button id="main-btn" onclick="run()">解析・翻訳する</button>

        <div id="result" class="res-box">
            <div class="full-card">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; gap: 10px;">
                    <span id="full-trans" class="full-text"></span>
                    <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
                        <button class="fav-btn" onclick="saveToNotebook()">⭐ 保存</button>
                        <button class="copy-btn" onclick="copyResult()">📋コピー</button>
                        <button id="speak-output-btn" class="speak-btn">🔊</button>
                    </div>
                </div>
                <div class="detail-line"><strong>IPA:</strong> <span id="full-ipa" class="ipa-text"></span></div>
                <div class="detail-line"><strong>読み:</strong> <span id="full-katakana"></span></div>
            </div>
            <div id="word-list"></div>
        </div>

        <div class="legend-card">
            <div class="legend-title" onclick="toggleLegend()">
                <span>💡 カタカナ声調記号の読み方（凡例）</span>
                <span id="legend-arrow">▼</span>
            </div>
            <div id="legend-content" class="legend-content">
                <strong>→ 平声（へいせい）：</strong>普通の高さでまっすぐ伸ばす<br>
                <strong>↓ 低声（ていせい）：</strong>最初から低く平らに発音する<br>
                <strong>↘ 下声（かせい）：</strong>高いところから一気に引き下ろす<br>
                <strong>↑ 高声（こうせい）：</strong>最初からずっと高い位置を保つ<br>
                <strong>↗ 上声（じょうせい）：</strong>低いところから一気に引き上げる<br>
                <strong>〜 長音（ちょうおん）：</strong>母音をのばして発音する
            </div>
        </div>

        <div class="notebook-card">
            <div class="notebook-title">
                <span>⭐ マイ単語帳（ローカル保存）</span>
                <span id="notebook-count" style="font-size: 11px; font-weight: normal; color: #8a6d00;">0件</span>
            </div>
            <ul id="notebook-list" class="notebook-list">
            </ul>
        </div>
    </div>

    <script>
        // リアルタイム文字数カウンター ＆ 警告ロジック
        function updateCharCount() {
            const inputArea = document.getElementById('input');
            const countSpan = document.getElementById('char-count');
            const len = inputArea.value.length;
            
            countSpan.innerText = len;
            if (len > 500) {
                countSpan.classList.add('counter-warn');
            } else {
                countSpan.classList.remove('counter-warn');
            }
        }

        // 入力の全消去機能
        function clearInput() {
            document.getElementById('input').value = '';
            updateCharCount(); // カウンターをリセット
            document.getElementById('input').focus();
        }

        // コピー機能
        function copyResult() {
            const textToCopy = document.getElementById('full-trans').innerText;
            if (!textToCopy) return;

            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            try {
                document.execCommand('copy');
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '✅完了!';
                setTimeout(() => copyBtn.innerText = originalText, 1500);
            } catch (err) {
                console.error('コピー失敗:', err);
            }
            document.body.removeChild(tempTextArea);
        }

        // 凡例表示トグル
        function toggleLegend() {
            const content = document.getElementById('legend-content');
            const arrow = document.getElementById('legend-arrow');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.innerText = '▼';
            } else {
                content.style.display = 'block';
                arrow.innerText = '▲';
            }
        }

        // ⭐ マイ単語帳（localStorage）制御ロジック一式（安全強化版）
        let currentResultData = null; // 現在の翻訳結果を保持する変数

        function loadNotebook() {
            const listEl = document.getElementById('notebook-list');
            const countEl = document.getElementById('notebook-count');
            let data = [];
            
            try {
                data = JSON.parse(localStorage.getItem('thai_notebook') || '[]');
                if (!Array.isArray(data)) {
                    data = [];
                }
            } catch (e) {
                console.error("ローカルストレージの読込エラー:", e);
                data = [];
            }
            
            countEl.innerText = data.length + "件";
            if (data.length === 0) {
                listEl.innerHTML = `<li style="color:#aaa; font-size:12px; text-align:center; padding:10px;">保存された単語はありません。</li>`;
                return;
            }

            listEl.innerHTML = data.map((item, index) => {
                // 万が一不完全なゴミデータが入っていた場合でもエラーにせず安全にスキップ・処理する
                if (!item) return '';
                const trans = item.trans || '';
                const katakana = item.katakana || '';
                const ipa = item.ipa || '';
                const origin = item.origin || '';
                
                // JS実行時エラーの最大の原因になる replace メソッド部分を安全に事前処理
                const safeTrans = trans.replace(/['"`\\]/g, '');

                return `
                    <li class="notebook-item">
                        <div style="flex-grow: 1; min-width: 0;">
                            <div style="font-weight: bold; color: #2c3e50; word-break: break-all;">${trans}</div>
                            <div style="font-size: 11px; color: #666; margin-top:2px;">
                                ${katakana} | <span class="ipa-text" style="font-size:11px;">${ipa}</span>
                            </div>
                            <div style="font-size: 11px; color: #888; background:#fff; padding:2px 6px; border-radius:4px; margin-top:2px; display:inline-block;">原文: ${origin}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
                            <button class="speak-btn" style="font-size:18px;" onclick="speak('${safeTrans}')">🔊</button>
                            <button class="notebook-del-btn" onclick="deleteFromNotebook(${index})">❌</button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function saveToNotebook() {
            if (!currentResultData) return;
            let data = [];
            
            try {
                data = JSON.parse(localStorage.getItem('thai_notebook') || '[]');
                if (!Array.isArray(data)) data = [];
            } catch (e) {
                data = [];
            }
            
            // 重複チェックも安全に実行（配列内に非オブジェクトがある場合のエラーを回避）
            const isDuplicate = data.some(item => item && item.trans === currentResultData.trans);
            if (isDuplicate) {
                alert("この結果はすでに単語帳に保存されています。");
                return;
            }

            data.unshift(currentResultData); // 先頭に追加
            localStorage.setItem('thai_notebook', JSON.stringify(data));
            
            const favBtn = document.querySelector('.fav-btn');
            if (favBtn) favBtn.innerText = "✅保存済";
            loadNotebook();
        }

        function deleteFromNotebook(index) {
            let data = [];
            try {
                data = JSON.parse(localStorage.getItem('thai_notebook') || '[]');
                if (!Array.isArray(data)) data = [];
            } catch (e) {
                data = [];
            }
            
            data.splice(index, 1);
            localStorage.setItem('thai_notebook', JSON.stringify(data));
            loadNotebook();
            
            const favBtn = document.querySelector('.fav-btn');
            if (favBtn && favBtn.innerText === "✅保存済") favBtn.innerText = "⭐ 保存";
        }

        // 初期ロード時に単語帳を読み込む
        window.addEventListener('DOMContentLoaded', loadNotebook);

        // 音声認識（Speech Recognition）の制御
        let recognition = null;
        let isListening = false;

        function toggleSpeechRecognition() {
            const micBtn = document.getElementById('mic-btn');
            const inputArea = document.getElementById('input');

            if (isListening) {
                if (recognition) recognition.stop();
                return;
            }

            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            if (!SpeechRecognition) {
                alert("お使いのブラウザ・環境は音声入力をサポートしていません。モバイル端末やChrome等でお試しください。");
                return;
            }

            recognition = new SpeechRecognition();
            
            const currentText = inputArea.value.trim();
            const isThaiInput = /[\u0E00-\u0E7F]/.test(currentText);
            recognition.lang = isThaiInput ? 'th-TH' : 'ja-JP';
            
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('recording-active');
                inputArea.placeholder = "音声を聞き取り中（お話しください）...";
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('recording-active');
                inputArea.placeholder = "タイ語または日本語を入力...";
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                inputArea.value = speechResult;
                updateCharCount(); // 文字数を更新
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラー:", event.error);
                isListening = false;
                micBtn.classList.remove('recording-active');
                inputArea.placeholder = "タイ語または日本語を入力...";
            };

            recognition.start();
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            const uttr = new SpeechSynthesisUtterance(text);
            const isThai = /[\u0E00-\u0E7F]/.test(text);
            uttr.lang = isThai ? 'th-TH' : 'ja-JP';

            const voices = window.speechSynthesis.getVoices();
            let voice = voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && v.name.includes('Google')) ||
                        voices.find(v => v.lang.includes(isThai ? 'th' : 'ja') && (v.name.includes('Siri') || v.name.includes('Premium') || v.name.includes('Kanya'))) ||
                        voices.find(v => v.lang.includes(isThai ? 'th' : 'ja'));
            
            if (voice) uttr.voice = voice;
            
            const slowMode = document.getElementById('slow-mode').checked;
            uttr.rate = slowMode ? 0.6 : 0.9;
            
            window.speechSynthesis.speak(uttr);
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function speakInput() {
            speak(document.getElementById('input').value.trim());
        }

        async function run() {
            const btn = document.getElementById('main-btn');
            const inputVal = document.getElementById('input').value.trim();
            if(!inputVal) return;

            btn.disabled = true; btn.textContent = "解析中...";
            document.getElementById('result').style.display = 'none';
            const favBtn = document.querySelector('.fav-btn');
            if (favBtn) favBtn.innerText = "⭐ 保存"; // 状態リセット

            try {
                const res = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: inputVal })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('full-trans').innerText = data.full_translation;
                document.getElementById('full-ipa').innerText = data.full_ipa;
                document.getElementById('full-katakana').innerText = data.full_katakana;
                
                // 単語帳保存用のオブジェクトを構築
                currentResultData = {
                    origin: inputVal,
                    trans: data.full_translation,
                    ipa: data.full_ipa,
                    katakana: data.full_katakana
                };

                document.getElementById('speak-output-btn').onclick = () => speak(data.full_translation);

                const list = document.getElementById('word-list');
                
                list.innerHTML = data.words.map(w => {
                    const cleanThai = (w.thai || '').replace(/['"`\n\r\\]/g, '').trim();
                    return `
                        <div class="word-card">
                            <div style="display:flex; justify-content:space-between; align-items:center; gap: 10px;">
                                <span class="thai-word">${cleanThai}</span>
                                <button class="speak-btn" style="flex-shrink:0;" onclick="speak('${cleanThai}')">🔊</button>
                            </div>
                            <div style="color:#666; font-size:14px; margin-top:5px;">
                                読み: ${w.reading || ''} | <span class="ipa-text">${w.ipa || ''}</span>
                            </div>
                            <div style="margin-top:8px;">${w.meaning || ''}</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('result').style.display = 'block';
            } catch (e) { alert("エラー: " + e.message); }
            finally { btn.disabled = false; btn.textContent = "解析・翻訳する"; }
        }
    </script>
</body>
</html>
