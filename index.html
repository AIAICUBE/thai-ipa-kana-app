<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ語・日本語 解析ツール</title>
    <style>
        /* 全体的なレイアウト */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background: #f0f2f5; color: #333; line-height: 1.6; }
        
        /* 枠（box）: heightを指定せず、中身に合わせて伸びるようにします */
        .box { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-height: 300px; /* 最低限の高さ */
            height: auto;      /* 内容量に応じて自動で伸びる */
        }

        h2 { text-align: center; color: #2d3436; margin-bottom: 25px; }
        
        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: border-color 0.3s;
            resize: vertical; /* ユーザーが手動で広げることも可能 */
        }
        textarea:focus { border-color: #00b894; outline: none; }

        button { 
            width: 100%; 
            padding: 15px; 
            background: #00b894; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 15px; 
            transition: background 0.3s;
        }
        button:hover { background: #00947a; }
        button:disabled { background: #b2bec3; cursor: not-allowed; }

        /* 結果表示エリア */
        .res-box { 
            margin-top: 30px; 
            display: none; 
            border-top: 1px solid #eee; 
            padding-top: 20px;
            animation: fadeIn 0.5s ease; /* パッと出るアニメーション */
        }

        .main-translation { 
            font-size: 20px; 
            font-weight: bold; 
            color: #2d3436; 
            margin-bottom: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        /* 単語カードのデザイン */
        .word-card { 
            background: #fff; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .thai-text { font-size: 24px; color: #00b894; font-weight: bold; margin-bottom: 5px; }
        .reading-text { color: #636e72; font-size: 14px; margin-bottom: 5px; }
        .meaning-text { font-size: 16px; color: #2d3436; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="box">
        <h2>タイ語 ⇄ 日本語 翻訳解析</h2>
        <textarea id="input" placeholder="タイ語の文章を入力してください..."></textarea>
        <button id="btn" onclick="run()">解析する</button>

        <div id="result" class="res-box">
            <div id="main-trans" class="main-translation"></div>
            <div id="word-list"></div>
        </div>
    </div>

    <script>
        async function run() {
            const btn = document.getElementById('btn');
            const input = document.getElementById('input');
            const text = input.value.trim();
            if(!text) return;

            btn.disabled = true; btn.textContent = "考え中...";
            const resultArea = document.getElementById('result');
            resultArea.style.display = 'none';

            try {
                const res = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                
                if(data.error) throw new Error(data.error + (data.message ? ": " + data.message : ""));

                // 全体訳を表示
                document.getElementById('main-trans').innerText = "全体訳: " + data.translation;
                
                // 単語リストを生成
                const list = document.getElementById('word-list');
                list.innerHTML = data.words.map(w => `
                    <div class="word-card">
                        <div class="thai-text">${w.thai}</div>
                        <div class="reading-text">読み: ${w.reading} | IPA: ${w.ipa}</div>
                        <div class="meaning-text">${w.meaning}</div>
                    </div>
                `).join('');
                
                // 最後に表示
                resultArea.style.display = 'block';
            } catch (e) { 
                alert("エラーが発生しました\n" + e.message); 
            } finally { 
                btn.disabled = false; btn.textContent = "解析する"; 
            }
        }
    </script>
</body>
</html>
